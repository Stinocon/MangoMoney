<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Mango shape -->
  <ellipse cx="16" cy="20" rx="12" ry="8" fill="#FF6B35" stroke="#E55A2B" stroke-width="1"/>
  
  <!-- Mango highlight -->
  <ellipse cx="14" cy="18" rx="6" ry="4" fill="#FF8C42" opacity="0.7"/>
  
  <!-- Mango stem -->
  <rect x="15" y="8" width="2" height="4" fill="#8B4513"/>
  
  <!-- Mango leaf -->
  <ellipse cx="18" cy="10" rx="3" ry="1.5" fill="#228B22" transform="rotate(15 18 10)"/>
  
  <!-- Money symbol -->
  <text x="16" y="24" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#FFD700">€</text>
</svg>
